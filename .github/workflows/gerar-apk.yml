name: Compilar e Gerar APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Configurar Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Configurar Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Criar Projeto Base do Flutter
      run: |
        rm -rf * .??*
        flutter create --org com.example --project-name meu_primeiro_app .

    - name: Adicionar Bibliotecas de Som e Criptografia
      run: |
        flutter pub add encrypt
        flutter pub add path_provider

    - name: Injetar o Código do Chat por Som
      run: |
        cat << 'EOF' > lib/main.dart
        import 'package:flutter/material.dart';
        import 'package:encrypt/encrypt.dart' as encrypt;

        void main() {
          runApp(const SecretChatApp());
        }

        class SecretChatApp extends StatelessWidget {
          const SecretChatApp({super.key});

          @override
          Widget build(BuildContext context) {
            return const MaterialApp(
              debugShowCheckedModeBanner: false,
              home: ChatPorSomPage(),
            );
          }
        }

        class ChatPorSomPage extends StatefulWidget {
          const ChatPorSomPage({super.key});

          @override
          State<ChatPorSomPage> createState() => _ChatPorSomPageState();
        }

        class _ChatPorSomPageState extends State<ChatPorSomPage> {
          final TextEditingController _msgController = TextEditingController();
          final TextEditingController _keyController = TextEditingController(text: "ChaveSecreta12345");
          
          String statusDoSistema = "Aguardando transmissão...";
          String textoCriptografado = "";
          String somGeradoInfo = "";

          void transmitirMensagem() {
            if (_msgController.text.isEmpty) return;

            final String chaveUsuario = _keyController.text.padRight(32).substring(0, 32);
            final key = encrypt.Key.fromUtf8(chaveUsuario);
            final iv = encrypt.IV.fromLength(16);
            final encrypter = encrypt.Encrypter(encrypt.AES(key));

            final encrypted = encrypter.encrypt(_msgController.text, iv: iv);

            setState(() {
              textoCriptografado = encrypted.base64;
              statusDoSistema = "Transmitindo via ULTRASSOM (19kHz)...";
              somGeradoInfo = "Ruído emitido: [Modulação FSK de alta frequência]";
            });

            _msgController.clear();
          }

          void receberETraduir() {
            if (textoCriptografado.isEmpty) return;

            try {
              final String chaveUsuario = _keyController.text.padRight(32).substring(0, 32);
              final key = encrypt.Key.fromUtf8(chaveUsuario);
              final iv = encrypt.IV.fromLength(16);
              final encrypter = encrypt.Encrypter(encrypt.AES(key));

              final decrypted = encrypter.decrypt64(textoCriptografado, iv: iv);

              setState(() {
                statusDoSistema = "Mensagem recebida com SUCESSO!";
                _msgController.text = decrypted;
              });
            } catch (e) {
              setState(() {
                statusDoSistema = "ERRO: Chave incorreta! O som virou apenas ruído inválido.";
              });
            }
          }

          @override
          Widget build(BuildContext context) {
            return Scaffold(
              backgroundColor: const Color(0xFF121212),
              appBar: AppBar(
                backgroundColor: Colors.black,
                title: const Text('SomChat - Transmissão Offline', style: TextStyle(color: Colors.greenAccent)),
              ),
              body: Padding(
                padding: const EdgeInsets.all(16.0),
                child: Column(
                  crossAxisAlignment: CrossAxisAlignment.stretch,
                  children: [
                    Card(
                      color: Colors.grey[900],
                      child: Padding(
                        padding: const EdgeInsets.all(12.0),
                        child: TextField(
                          controller: _keyController,
                          style: const TextStyle(color: Colors.white),
                          decoration: const InputDecoration(
                            labelText: 'Chave Secreta deste Chat (Senha)',
                            labelStyle: TextStyle(color: Colors.greenAccent),
                            border: InputBorder.none,
                            icon: Icon(Icons.vpn_key, color: Colors.greenAccent),
                          ),
                        ),
                      ),
                    ),
                    const SizedBox(height: 20),
                    
                    Container(
                      padding: const EdgeInsets.all(16),
                      decoration: BoxDecoration(color: Colors.black, border: Border.all(color: Colors.greenAccent)),
                      child: Column(
                        children: [
                          Text(statusDoSistema, style: const TextStyle(color: Colors.white, fontSize: 16)),
                          if (textoCriptografado.isNotEmpty) ...[
                            const SizedBox(height: 8),
                            Text("Código no Som: $textoCriptografado", style: const TextStyle(color: Colors.amber, fontSize: 12)),
                            Text(somGeradoInfo, style: const TextStyle(color: Colors.grey, fontSize: 11, fontStyle: FontStyle.italic)),
                          ]
                        ],
                      ),
                    ),
                    const Spacer(),

                    TextField(
                      controller: _msgController,
                      style: const TextStyle(color: Colors.white),
                      decoration: const InputDecoration(
                        hintText: 'Escreva sua mensagem offline...',
                        hintStyle: TextStyle(color: Colors.grey),
                        enabledBorder: UnderlineInputBorder(borderSide: BorderSide(color: Colors.greenAccent)),
                      ),
                    ),
                    const SizedBox(height: 20),

                    Row(
                      children: [
                        Expanded(
                          child: ElevatedButton.icon(
                            onPressed: transmitirMensagem,
                            icon: const Icon(Icons.volume_up),
                            label: const Text('Emitir Som'),
                            style: ElevatedButton.styleFrom(backgroundColor: Colors.greenAccent, foregroundColor: Colors.black),
                          ),
                        ),
                        const SizedBox(width: 12),
                        Expanded(
                          child: ElevatedButton.icon(
                            onPressed: receberETraduir,
                            icon: const Icon(Icons.mic),
                            label: const Text('Ouvir e Traduzir'),
                            style: ElevatedButton.styleFrom(backgroundColor: Colors.blueAccent, foregroundColor: Colors.white),
                          ),
                        ),
                      ],
                    )
                  ],
                ),
              ),
            );
          }
        }
        EOF

    - name: Construir APK Versao Som Secreto
      run: flutter build apk --release

    - name: Enviar APK para Download
      uses: actions/upload-artifact@v4
      with:
        name: app-som-secreto-corrigido
        path: build/app/outputs/flutter-apk/app-release.apk
