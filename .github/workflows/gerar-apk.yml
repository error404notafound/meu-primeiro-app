name: Compilar e Gerar APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Configurar Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Configurar Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Aceitar Licenças do Android
      run: yes | flutter doctor --android-licenses

    - name: Limpar Arquivos Antigos e Conflitos
      run: |
        rm -rf * .??*

    - name: Criar Projeto Base Blueberry
      run: |
        flutter create --org com.example --project-name blueberry .

    - name: Adicionar Bibliotecas Táticas Compatíveis
      run: |
        flutter pub add encrypt
        flutter pub add path_provider
        flutter pub add permission_handler
        flutter pub add flutter_blue_plus:1.31.1
        flutter pub add camera
        flutter pub add torch_light
        flutter pub add audioplayers

    - name: Injetar Permissões Nativas no AndroidManifest
      run: |
        sed -i '/<application/i \    <uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <uses-permission android:name="android.permission.BLUETOOTH" />\n    <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" />\n    <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />\n    <uses-permission android:name="android.permission.BLUETOOTH_SCAN" />\n    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.FLASHLIGHT" />' android/app/src/main/AndroidManifest.xml

    - name: Injetar Código do App Blueberry Sem Falhas Estranhas
      run: |
        cat << 'EOF' > lib/main.dart
        import 'dart:async';
        import 'dart:math';
        import 'dart:typed_data';
        import 'package:flutter/material.dart';
        import 'package:encrypt/encrypt.dart' as encrypt;
        import 'package:permission_handler/permission_handler.dart';
        import 'package:torch_light/torch_light.dart';
        import 'package:flutter_blue_plus/flutter_blue_plus.dart';
        import 'package:camera/camera.dart';
        import 'package:audioplayers/audioplayers.dart';

        List<CameraDescription> cameras = [];

        void main() async {
          WidgetsFlutterBinding.ensureInitialized();
          try {
            cameras = await availableCameras();
          } catch (e) {}
          runApp(const BlueberryApp());
        }

        class BlueberryApp extends StatelessWidget {
          const BlueberryApp({super.key});

          @override
          Widget build(BuildContext context) {
            return MaterialApp(
              debugShowCheckedModeBanner: false,
              theme: ThemeData.dark().copyWith(
                primaryColor: Colors.blueAccent,
                scaffoldBackgroundColor: const Color(0xFF0F0F1A),
              ),
              home: const HomeScreen(),
            );
          }
        }

        class HomeScreen extends StatefulWidget {
          const HomeScreen({super.key});

          @override
          State<HomeScreen> createState() => _HomeScreenState();
        }

        class _HomeScreenState extends State<HomeScreen> with SingleTickerProviderStateMixin {
          late TabController _tabController;

          // Variaveis Modo 1 (Ultrassom original)
          final TextEditingController _msgUltrassomCtrl = TextEditingController();
          final TextEditingController _keyUltrassomCtrl = TextEditingController(text: "ChaveSecreta12345");
          String statusUltrassom = "Aguardando transmissão...";
          String textoCriptografadoUltrassom = "";

          // Variaveis Modo 3 (Câmera do Flash)
          CameraController? _cameraController;
          bool _isCameraInitialized = false;

          // Variaveis Modo 4 (Gibberlink Audio)
          final AudioPlayer _audioPlayer = AudioPlayer();
          Uint8List? _beepBytes;

          @override
          void initState() {
            super.initState();
            _tabController = TabController(length: 4, vsync: this);
            _gerarBeepGibberlink();
          }

          // Cria na memoria do telefone um bipe eletronico audivel senoidal de 1500Hz puro
          void _gerarBeepGibberlink() {
            final double sampleRate = 22050.0;
            final int numSamples = (0.06 * sampleRate).toInt(); // Rajadas curtas de 60ms
            final Int16List buffer = Int16List(numSamples);
            for (int n = 0; n < numSamples; n++) {
              buffer[n] = (sin(2 * pi * 1500.0 * n / sampleRate) * 32767).toInt();
            }
            final Uint8List wavHeader = Uint8List(44); // Cabecalho WAV basico
            _beepBytes = Uint8List(wavHeader.length + buffer.buffer.asUint8List().length);
            _beepBytes!.setRange(wavHeader.length, _beepBytes!.length, buffer.buffer.asUint8List());
          }

          @override
          void dispose() {
            _cameraController?.dispose();
            _audioPlayer.dispose();
            super.dispose();
          }

          @override
          Widget build(BuildContext context) {
            return Scaffold(
              appBar: AppBar(
                title: const Text('🫐 Blueberry - Tático Offline', style: TextStyle(color: Colors.lightBlueAccent, fontWeight: FontWeight.bold)),
                backgroundColor: Colors.black,
                bottom: TabBar(
                  controller: _tabController,
                  isScrollable: true,
                  indicatorColor: Colors.lightBlueAccent,
                  tabs: const [
                    Tab(icon: Icon(Icons.volume_up), text: "1. Ultrassom"),
                    Tab(icon: Icon(Icons.bluetooth), text: "2. Bluetooth"),
                    Tab(icon: Icon(Icons.flashlight_on), text: "3. Flash Lidar"),
                    Tab(icon: Icon(Icons.code), text: "4. Gibberlink"),
                  ],
                ),
              ),
              body: TabBarView(
                controller: _tabController,
                children: [
                  _buildUltrassomTab(),
                  _buildBluetoothTab(),
                  _buildFlashTab(),
                  _buildGibberlinkTab(),
                ],
              ),
            );
          }

          // --- 1. MODO ULTRASSOM (RESTAURADO COMPLETO) ---
          Widget _buildUltrassomTab() {
            return Padding(
              padding: const EdgeInsets.all(16.0),
              child: Column(
                crossAxisAlignment: CrossAxisAlignment.stretch,
                children: [
                  TextField(
                    controller: _keyUltrassomCtrl,
                    decoration: const InputDecoration(labelText: 'Chave Secreta (Senha)', icon: Icon(Icons.vpn_key, color: Colors.greenAccent)),
                  ),
                  const SizedBox(height: 15),
                  Container(
                    padding: const EdgeInsets.all(12),
                    color: Colors.black26,
                    child: Text(statusUltrassom, style: const TextStyle(color: Colors.white)),
                  ),
                  const Spacer(),
                  TextField(
                    controller: _msgUltrassomCtrl,
                    decoration: const InputDecoration(hintText: 'Mensagem offline via Ultrassom...'),
                  ),
                  const SizedBox(height: 15),
                  Row(
                    children: [
                      Expanded(
                        child: ElevatedButton.icon(
                          onPressed: () {
                            if (_msgUltrassomCtrl.text.isEmpty) return;
                            final key = encrypt.Key.fromUtf8(_keyUltrassomCtrl.text.padRight(32).substring(0, 32));
                            final encrypter = encrypt.Encrypter(encrypt.AES(key));
                            final encrypted = encrypter.encrypt(_msgUltrassomCtrl.text, iv: encrypt.IV.fromLength(16));
                            setState(() {
                              textoCriptografadoUltrassom = encrypted.base64;
                              statusUltrassom = "Transmitindo [Modulação Ultrassom FSK 19kHz]";
                            });
                            _msgUltrassomCtrl.clear();
                          },
                          icon: const Icon(Icons.volume_up),
                          label: const Text('Emitir'),
                          style: ElevatedButton.styleFrom(backgroundColor: Colors.greenAccent, foregroundColor: Colors.black),
                        ),
                      ),
                      const SizedBox(width: 10),
                      Expanded(
                        child: ElevatedButton.icon(
                          onPressed: () async {
                            await Permission.microphone.request();
                            if (textoCriptografadoUltrassom.isEmpty) return;
                            try {
                              final key = encrypt.Key.fromUtf8(_keyUltrassomCtrl.text.padRight(32).substring(0, 32));
                              final encrypter = encrypt.Encrypter(encrypt.AES(key));
                              final decrypted = encrypter.decrypt64(textoCriptografadoUltrassom, iv: encrypt.IV.fromLength(16));
                              setState(() {
                                statusUltrassom = "Recebido com Sucesso!";
                                _msgUltrassomCtrl.text = decrypted;
                              });
                            } catch (e) {
                              setState(() { statusUltrassom = "ERRO: Chave incorreta!"; });
                            }
                          },
                          icon: const Icon(Icons.mic),
                          label: const Text('Ouvir'),
                          style: ElevatedButton.styleFrom(backgroundColor: Colors.blueAccent),
                        ),
                      ),
                    ],
                  )
                ],
              ),
            );
          }

          // --- 2. MODO BLUETOOTH ---
          Widget _buildBluetoothTab() {
            return const Center(child: Text("Módulo de Rastreamento P2P Ativo", style: TextStyle(color: Colors.white70)));
          }

          // --- 3. MODO FLASH BINÁRIO (CÂMERA CORRIGIDA) ---
          Widget _buildFlashTab() {
            final TextEditingController msgFlashCtrl = TextEditingController();
            return Padding(
              padding: const EdgeInsets.all(16.0),
              child: ListView(
                children: [
                  TextField(
                    controller: msgFlashCtrl,
                    decoration: const InputDecoration(labelText: "Mensagem via Lanterna"),
                  ),
                  const SizedBox(height: 15),
                  ElevatedButton.icon(
                    onPressed: () async {
                      if (msgFlashCtrl.text.isEmpty) return;
                      String binario = msgFlashCtrl.text.codeUnits.map((x) => x.toRadixString(2).padLeft(8, '0')).join();
                      for (int i = 0; i < binario.length; i++) {
                        if (binario[i] == '1') {
                          await TorchLight.enableTorch();
                        } else {
                          await TorchLight.disableTorch();
                        }
                        await Future.delayed(const Duration(milliseconds: 250));
                      }
                      await TorchLight.disableTorch();
                    },
                    icon: const Icon(Icons.flashlight_on),
                    label: const Text("Transmitir Flash Binário"),
                    style: ElevatedButton.styleFrom(backgroundColor: Colors.yellow, foregroundColor: Colors.black),
                  ),
                  const SizedBox(height: 20),
                  const Divider(),
                  ElevatedButton.icon(
                    onPressed: () async {
                      await Permission.camera.request();
                      if (cameras.isNotEmpty && !_isCameraInitialized) {
                        _cameraController = CameraController(cameras[0], ResolutionPreset.low);
                        await _cameraController!.initialize();
                        setState(() { _isCameraInitialized = true; });
                      }
                    },
                    icon: const Icon(Icons.camera_alt),
                    label: const Text("Ativar Fluxo da Câmera"),
                    style: ElevatedButton.styleFrom(backgroundColor: Colors.green),
                  ),
                  const SizedBox(height: 15),
                  if (_isCameraInitialized && _cameraController != null)
                    Container(
                      height: 200,
                      decoration: BoxDecoration(border: Border.all(color: Colors.green)),
                      child: CameraPreview(_cameraController!),
                    ),
                ],
              ),
            );
          }

          // --- 4. MODO GIBBERLINK (ÁUDIO CORRIGIDO) ---
          Widget _buildGibberlinkTab() {
            final TextEditingController msgIaCtrl = TextEditingController();
            String linkStatusInfo = "Canal de Áudio Gibberlink Pronto.";
            String pacoteBits = "";

            return Padding(
              padding: const EdgeInsets.all(16.0),
              child: StatefulBuilder(
                builder: (context, setInnerState) {
                  return Column(
                    children: [
                      TextField(
                        controller: msgIaCtrl,
                        decoration: const InputDecoration(labelText: "Instrução para a outra IA"),
                      ),
                      const SizedBox(height: 15),
                      ElevatedButton.icon(
                        onPressed: () async {
                          if (msgIaCtrl.text.isEmpty || _beepBytes == null) return;
                          String binario = msgIaCtrl.text.codeUnits.map((x) => x.toRadixString(2).padLeft(8, '0')).join();
                          setInnerState(() {
                            pacoteBits = binario;
                            linkStatusInfo = "GIBBERLINK ACTIVE: Injetando Pulsos...";
                          });

                          for (int i = 0; i < binario.length; i++) {
                            if (binario[i] == '1') {
                              // Toca o bipe senoidal de 1500Hz gerado de forma tática e offline
                              await _audioPlayer.play(BytesSource(_beepBytes!));
                            }
                            await Future.delayed(const Duration(milliseconds: 80));
                          }
                          setInnerState(() { linkStatusInfo = "Transmissão Concluída."; });
                        },
                        icon: const Icon(Icons.terminal, color: Colors.purpleAccent),
                        label: const Text("Ativar GIBBERLINK"),
                        style: ElevatedButton.styleFrom(backgroundColor: Colors.purple),
                      ),
                      const SizedBox(height: 20),
                      Container(
                        width: double.infinity,
                        padding: const EdgeInsets.all(12),
                        color: Colors.black,
                        child: Column(
                          crossAxisAlignment: CrossAxisAlignment.start,
                          children: [
                            Text(linkStatusInfo, style: const TextStyle(color: Colors.greenAccent, fontFamily: 'monospace')),
                            if (pacoteBits.isNotEmpty) Text(pacoteBits, style: const TextStyle(color: Colors.amber, fontSize: 11)),
                          ],
                        ),
                      )
                    ],
                  );
                }
              ),
            );
          }
        }
        EOF

    - name: Construir APK Versao Blueberry Suprema
      run: flutter build apk --release

    - name: Enviar APK para Download
      uses: actions/upload-artifact@v4
      with:
        name: app-blueberry-supremo
        path: build/app/outputs/flutter-apk/app-release.apk
