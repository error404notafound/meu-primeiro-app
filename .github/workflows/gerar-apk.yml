name: Compilar e Gerar APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Configurar Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Configurar Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Aceitar Licenças do Android
      run: yes | flutter doctor --android-licenses

    - name: Criar Projeto Base do Flutter com Nome Blueberry
      run: |
        rm -rf * .??*
        flutter create --org com.example --project-name blueberry .

    - name: Adicionar Bibliotecas para os 4 Modos Secretos
      run: |
        flutter pub add encrypt
        flutter pub add path_provider
        flutter pub add permission_handler
        flutter pub add flutter_blue_plus
        flutter pub add camera
        flutter pub add torch_light
        flutter pub add soundpool

    - name: Injetar Permissões Nativas no AndroidManifest (Microfone, Bluetooth, Câmera e Flash)
      run: |
        sed -i '/<application/i \    <uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <uses-permission android:name="android.permission.BLUETOOTH" />\n    <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" />\n    <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />\n    <uses-permission android:name="android.permission.BLUETOOTH_SCAN" />\n    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.FLASHLIGHT" />' android/app/src/main/AndroidManifest.xml

    - name: Injetar Código Completo do App Blueberry Multimodos com Som Ativo
      run: |
        cat << 'EOF' > lib/main.dart
        import 'dart:math';
        import 'dart:typed_data';
        import 'package:flutter/material.dart';
        import 'package:encrypt/encrypt.dart' as encrypt;
        import 'package:permission_handler/permission_handler.dart';
        import 'package:torch_light/torch_light.dart';
        import 'package:flutter_blue_plus/flutter_blue_plus.dart';
        import 'package:soundpool/soundpool.dart';

        void main() {
          runApp(const BlueberryApp());
        }

        class BlueberryApp extends StatelessWidget {
          const BlueberryApp({super.key});

          @override
          Widget build(BuildContext context) {
            return MaterialApp(
              debugShowCheckedModeBanner: false,
              theme: ThemeData.dark().copyWith(
                primaryColor: Colors.blueAccent,
                scaffoldBackgroundColor: const Color(0xFF0F0F1A),
              ),
              home: const HomeScreen(),
            );
          }
        }

        class HomeScreen extends StatefulWidget {
          const HomeScreen({super.key});

          @override
          State<HomeScreen> createState() => _HomeScreenState();
        }

        class _HomeScreenState extends State<HomeScreen> with SingleTickerProviderStateMixin {
          late TabController _tabController;
          Soundpool? _pool;
          final Map<String, int> _soundIds = {};

          @override
          void initState() {
            super.initState();
            _tabController = TabController(length: 4, vsync: this);
            _initSounds();
          }

          // Inicializa o gerenciador de áudio nativo e gera as frequências na memória
          void _initSounds() async {
            _pool = Soundpool.fromOptions(options: const SoundpoolOptions(streamType: StreamType.music));
            
            // Gera bipes de teste em memória para os símbolos de IA
            final List<double> freqs = [600.0, 1200.0, 1400.0, 1600.0, 1800.0, 2000.0];
            final List<String> syms = ['▰', '⏃', '⟒', '⟌', '⍁', '⎎'];
            
            for (int i = 0; i < freqs.length; i++) {
              final double sampleRate = 44100.0;
              final int numSamples = (0.2 * sampleRate).toInt(); // 200ms por som
              final Int16List buffer = Int16List(numSamples);
              
              for (int n = 0; n < numSamples; n++) {
                buffer[n] = (sin(2 * pi * freqs[i] * n / sampleRate) * 32767).toInt();
              }
              
              final Uint8List byteBuffer = buffer.buffer.asUint8List();
              int id = await _pool!.loadUint8List(byteBuffer);
              _soundIds[syms[i]] = id;
            }
          }

          @override
          void dispose() {
            _pool?.dispose();
            super.dispose();
          }

          @override
          Widget build(BuildContext context) {
            return Scaffold(
              appBar: AppBar(
                title: const Text(' Blueberry - Tático Offline', style: TextStyle(color: Colors.lightBlueAccent, fontWeight: FontWeight.bold)),
                backgroundColor: Colors.black,
                bottom: TabBar(
                  controller: _tabController,
                  isScrollable: true,
                  indicatorColor: Colors.lightBlueAccent,
                  tabs: const [
                    Tab(icon: Icon(Icons.volume_up), text: "1. Ultrassom"),
                    Tab(icon: Icon(Icons.bluetooth), text: "2. Bluetooth"),
                    Tab(icon: Icon(Icons.flashlight_on), text: "3. Flash Lidar"),
                    Tab(icon: Icon(Icons.code), text: "4. Idioma IA"),
                  ],
                ),
              ),
              body: TabBarView(
                controller: _tabController,
                children: [
                  _buildUltrassomTab(),
                  _buildBluetoothTab(),
                  _buildFlashTab(),
                  _buildIQLangTab(),
                ],
              ),
            );
          }

          Widget _buildUltrassomTab() {
            return const Center(child: Text("Modo Ultrassom Ativo\n(Mesmo sistema de criptografia anterior)", textAlign: TextAlign.center, style: TextStyle(color: Colors.white70)));
          }

          Widget _buildBluetoothTab() {
            return Padding(
              padding: const EdgeInsets.all(16.0),
              child: Column(
                mainAxisAlignment: MainAxisAlignment.center,
                children: [
                  const Icon(Icons.bluetooth_searching, size: 64, color: Colors.blue),
                  const SizedBox(height: 10),
                  const Text("Comunicação BLE Criptografada", style: TextStyle(fontSize: 18, fontWeight: FontWeight.bold)),
                  const SizedBox(height: 5),
                  const Text("Cada conversa gera uma assinatura única AES-256 baseada no ID do hardware.", textAlign: TextAlign.center, style: TextStyle(color: Colors.grey)),
                  const Spacer(),
                  ElevatedButton.icon(
                    onPressed: () async {
                      await [Permission.bluetoothConnect, Permission.bluetoothScan, Permission.location].request();
                      try {
                        await FlutterBluePlus.startScan(timeout: const Duration(seconds: 4));
                      } catch (e) {}
                    },
                    icon: const Icon(Icons.refresh),
                    label: const Text("Buscar Dispositivos Próximos"),
                    style: ElevatedButton.styleFrom(backgroundColor: Colors.blue, foregroundColor: Colors.white),
                  )
                ],
              ),
            );
          }

          Widget _buildFlashTab() {
            final TextEditingController msgFlashCtrl = TextEditingController();
            return Padding(
              padding: const EdgeInsets.all(16.0),
              child: Column(
                children: [
                  TextField(
                    controller: msgFlashCtrl,
                    decoration: const InputDecoration(labelText: "Mensagem Tática (Ex: 'Meu chefe é um corno')", labelStyle: TextStyle(color: Colors.yellowAccent)),
                  ),
                  const SizedBox(height: 20),
                  ElevatedButton.icon(
                    onPressed: () async {
                      String texto = msgFlashCtrl.text;
                      if (texto.isEmpty) return;
                      
                      String binario = texto.codeUnits.map((x) => x.toRadixString(2).padLeft(8, '0')).join();
                      
                      for (int i = 0; i < binario.length; i++) {
                        if (binario[i] == '1') {
                          await TorchLight.enableTorch();
                        } else {
                          await TorchLight.disableTorch();
                        }
                        await Future.delayed(const Duration(milliseconds: 300));
                      }
                      await TorchLight.disableTorch();
                    },
                    icon: const Icon(Icons.flashlight_on),
                    label: const Text("Transmitir via Flash Óptico"),
                    style: ElevatedButton.styleFrom(backgroundColor: Colors.yellow, foregroundColor: Colors.black),
                  ),
                  const SizedBox(height: 30),
                  const Divider(color: Colors.grey),
                  const SizedBox(height: 10),
                  ElevatedButton.icon(
                    onPressed: () async {
                      await Permission.camera.request();
                    },
                    icon: const Icon(Icons.camera_alt),
                    label: const Text("Abrir Câmera para Descriptografar Binário"),
                    style: ElevatedButton.styleFrom(backgroundColor: Colors.green, foregroundColor: Colors.white),
                  )
                ],
              ),
            );
          }

          Widget _buildIQLangTab() {
            final TextEditingController msgIaCtrl = TextEditingController();
            String resultadoIaStr = "";
            
            String codificarParaLinguaIA(String input) {
              return input.toLowerCase()
                .replaceAll('a', '⏃').replaceAll('e', '⟒').replaceAll('i', '⟌')
                .replaceAll('o', '⍁').replaceAll('u', '⎎').replaceAll(' ', '▰');
            }

            void emitirSomSintetico(String runas) async {
              if (_pool == null) return;
              for (int i = 0; i < runas.length; i++) {
                String char = runas[i];
                if (_soundIds.containsKey(char)) {
                  await _pool!.play(_soundIds[char]!);
                }
                await Future.delayed(const Duration(milliseconds: 250)); // Intervalo entre os bipes
              }
            }

            return Padding(
              padding: const EdgeInsets.all(16.0),
              child: StatefulBuilder(
                builder: (context, setInnerState) {
                  return Column(
                    children: [
                      TextField(
                        controller: msgIaCtrl,
                        style: const TextStyle(color: Colors.white),
                        decoration: const InputDecoration(labelText: "Mensagem Humana", labelStyle: TextStyle(color: Colors.purpleAccent)),
                      ),
                      const SizedBox(height: 20),
                      ElevatedButton.icon(
                        onPressed: () {
                          setInnerState(() {
                            resultadoIaStr = codificarParaLinguaIA(msgIaCtrl.text);
                          });
                        },
                        icon: const Icon(Icons.psychology),
                        label: const Text("Traduzir para Língua Sintética de IA"),
                        style: ElevatedButton.styleFrom(backgroundColor: Colors.purple, foregroundColor: Colors.white),
                      ),
                      const SizedBox(height: 20),
                      if (resultadoIaStr.isNotEmpty) ...[
                        Container(
                          width: double.infinity,
                          padding: const EdgeInsets.all(12),
                          color: Colors.black45,
                          child: Text("Criptografia Linguística:\n$resultadoIaStr", style: const TextStyle(color: Colors.greenAccent, fontSize: 16, fontFamily: 'monospace')),
                        ),
                        const SizedBox(height: 20),
                        ElevatedButton.icon(
                          onPressed: () {
                            emitirSomSintetico(resultadoIaStr);
                          },
                          icon: const Icon(Icons.volume_up),
                          label: const Text("Transmitir Linguagem via Som"),
                          style: ElevatedButton.styleFrom(backgroundColor: Colors.deepPurpleAccent, foregroundColor: Colors.white),
                        )
                      ]
                    ],
                  );
                }
              ),
            );
          }
        }
        EOF

    - name: Construir APK Versao Blueberry Suprema
      run: flutter build apk --release

    - name: Enviar APK para Download
      uses: actions/upload-artifact@v4
      with:
        name: app-blueberry-supremo
        path: build/app/outputs/flutter-apk/app-release.apk
