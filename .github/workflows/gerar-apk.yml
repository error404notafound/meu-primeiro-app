name: Compilar e Gerar APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Configurar Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Configurar Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Criar projeto moderno e limpo
      run: |
        mv lib/main.dart ./main.dart.bak || true
        rm -rf * .??*
        flutter create --org com.example --project-name meu_primeiro_app .
        mkdir -p lib
        mv ../main.dart.bak lib/main.dart || true
        flutter pub add firebase_core

    - name: Limpeza Profunda do Cache
      run: |
        flutter clean
        flutter pub get

    - name: Construir APK de Release
      run: flutter build apk --release

    - name: Enviar APK para Download
      uses: actions/upload-artifact@v4
      with:
        name: app-facebook-layout
        path: build/app/outputs/flutter-apk/app-release.apk
